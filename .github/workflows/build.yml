name: Build Cross-Platform

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===================================================
  # 1. WINDOWS BUILD (Your existing workflow)
  # ===================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build with PyInstaller
        # Only building the main one for brevity, add the UserTesting one if needed
        run: |
          pyinstaller --clean --noconfirm cubelab-usertesting.spec
          pyinstaller --clean --noconfirm cubelab.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: installers/*.exe
          retention-days: 10

  # ===================================================
  # 2. MACOS BUILD (Monterey+)
  # ===================================================
  build-macos:
    name: Build macOS (Monterey+)
    runs-on: macos-12 # Uses Intel runner (Monterey), compatible with Apple Silicon via Rosetta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Create-DMG
        run: brew install create-dmg

      - name: Run Build Script
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: installers/*.dmg
          retention-days: 10

  # ===================================================
  # 3. LINUX BUILD (AppImage)
  # ===================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-20.04 # Older Ubuntu = Better AppImage compatibility (glibc)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install System Dependencies
        # We manually install the libs your script checks for to prevent failure
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-xinerama0 libxkbcommon-x11-0 libfuse2

      - name: Run Build Script
        # APPIMAGE_EXTRACT_AND_RUN is required for appimagetool to run inside GitHub Actions CI
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          chmod +x build_linux.sh
          ./build_linux.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: installers/*.AppImage
          retention-days: 10