name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # FIX 1: Install Visual C++ Redistributable
      - name: Install Visual C++ Redistributable
        run: choco install vcredist140 -y

      # FIX 2: Remove problematic __init__.py files
      - name: Remove problematic __init__.py files
        run: |
          if (Test-Path ".\__init__.py") { Remove-Item ".\__init__.py" -Force }
          if (Test-Path ".\src\__init__.py") { Remove-Item ".\src\__init__.py" -Force }
        shell: pwsh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # FIX 3: Pin exact matching PyQt6 versions
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.1 PyQt6-Qt6==6.7.1 PyQt6-sip==13.8.0
          pip install pyinstaller==6.10.0
          pip install -r requirements.txt

      - name: Install pypore3d from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pypore3d
        continue-on-error: true

      # FIX 4: Create runtime hook for DLL loading
      - name: Create runtime hook
        run: |
          New-Item -ItemType Directory -Force -Path hooks
          @"
          import os
          import sys
          if sys.platform == 'win32':
              if hasattr(os, 'add_dll_directory'):
                  os.add_dll_directory(sys._MEIPASS)
                  qt_bin = os.path.join(sys._MEIPASS, 'PyQt6', 'Qt6', 'bin')
                  if os.path.exists(qt_bin):
                      os.add_dll_directory(qt_bin)
          "@ | Out-File -FilePath hooks/rthook_pyqt6.py -Encoding utf8
        shell: pwsh

      - name: Build CubeLab
        run: pyinstaller --clean --noconfirm cubelab.spec

      - name: Build CubeLab-UserTesting
        run: pyinstaller --clean --noconfirm cubelab-usertesting.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          mkdir installers
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-setup.iss
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true

      - name: Fallback to ZIP
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installers
          Compress-Archive -Path "dist\CubeLab\*" -DestinationPath "installers\CubeLab-Windows.zip"
          Compress-Archive -Path "dist\CubeLab-UserTesting\*" -DestinationPath "installers\CubeLab-UserTesting-Windows.zip"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            installers/*.exe
            installers/*.zip
          retention-days: 30

  release:
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
          draft: false
          prerelease: $ contains(github.ref, '-alpha') || contains(github.ref, '-beta') 
          generate_release_notes: true