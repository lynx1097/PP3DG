name: Build & Release Suite

on:
  push:
    branches: [main]
    tags: ['v*'] # Triggers release when you push a tag like v1.0
  pull_request:
    branches: [main]
  workflow_dispatch:

# Critical: Allows the workflow to create Releases and upload assets
permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===================================================
  # 1. MACOS BUILD (Universal Intel/ARM DMG)
  # ===================================================
  build-macos:
    name: Build macOS
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (Force x64)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: 'x64' # Forces Intel build (runs on both Intel & Apple Silicon)

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build Suite
        run: pyinstaller --clean --noconfirm build.spec

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "CubeLab Suite" \
            --window-pos 200 120 \
            --window-size 600 400 \
            "installers/CubeLab-Suite-macOS.dmg" \
            "dist/CubeLab_Suite/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: installers/*.dmg
          retention-days: 1

  # ===================================================
  # 2. LINUX BUILD (Ubuntu 22.04 Tarball)
  # ===================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-xinerama0 libxkbcommon-x11-0

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build Suite
        run: pyinstaller --clean --noconfirm build.spec

      - name: Compress Suite
        run: |
          mkdir -p installers
          cd dist
          # Compress to .tar.gz for release
          tar -czvf ../installers/CubeLab-Suite-Linux.tar.gz CubeLab_Suite/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: installers/*.tar.gz
          retention-days: 1

  # ===================================================
  # 3. WINDOWS BUILD (Portable Zip)
  # ===================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build Suite
        run: pyinstaller --clean --noconfirm build.spec

      - name: Zip for Release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installers
          # Create a Zip file for the GitHub Release (Releases cannot accept raw folders)
          Compress-Archive -Path "dist\CubeLab_Suite\*" -DestinationPath "installers\CubeLab-Suite-Windows.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installers/*.zip
          retention-days: 1

  # ===================================================
  # 4. PUBLISH RELEASE
  # ===================================================
  publish-release:
    name: Publish Release
    needs: [build-macos, build-linux, build-windows] # Waits for all builds to finish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Only run if tag starts with 'v'
    
    steps:
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: release_assets

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: release_assets

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          draft: false
          prerelease: false
          generate_release_notes: true