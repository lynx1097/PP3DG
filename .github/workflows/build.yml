name: Build & Release Suite (No Storage Usage)

on:
  push:
    branches: [main]
    tags: ['v*'] # Triggers on tags like v1.0
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Required to upload to Releases

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===================================================
  # 1. MACOS BUILD & UPLOAD
  # ===================================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (Force x64)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: 'x64'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build Suite
        run: pyinstaller --clean --noconfirm build.spec

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "CubeLab Suite" \
            --window-pos 200 120 \
            --window-size 600 400 \
            "installers/CubeLab-Suite-macOS.dmg" \
            "dist/CubeLab_Suite/"

      # DIRECT UPLOAD: Bypasses Artifact Storage Limit
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: installers/CubeLab-Suite-macOS.dmg
          draft: false
          prerelease: false

  # ===================================================
  # 2. LINUX BUILD & UPLOAD
  # ===================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-xinerama0 libxkbcommon-x11-0

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build Suite
        run: pyinstaller --clean --noconfirm build.spec

      - name: Compress Suite
        run: |
          mkdir -p installers
          cd dist
          tar -czvf ../installers/CubeLab-Suite-Linux.tar.gz CubeLab_Suite/

      # DIRECT UPLOAD: Bypasses Artifact Storage Limit
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: installers/CubeLab-Suite-Linux.tar.gz
          draft: false
          prerelease: false

  # ===================================================
  # 3. WINDOWS BUILD & UPLOAD
  # ===================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build Suite
        run: pyinstaller --clean --noconfirm build.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-setup.iss
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
          continue-on-error: true


      
      # DIRECT UPLOAD: Bypasses Artifact Storage Limit
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          path: |
            installers/*.exe
          draft: false
          prerelease: false