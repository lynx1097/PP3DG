# =====================================================
# Cube Lab - Windows Build Pipeline
# =====================================================
# Creates standalone Windows installer

name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: '3.12'

jobs:
  # =====================================================
  # WINDOWS BUILD
  # =====================================================
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # FIX: Install Visual C++ Redistributable for Qt DLLs
      - name: Install Visual C++ Redistributable
        run: choco install vcredist140 -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.6.1 PyQt6-Qt6==6.6.1
          pip install pyinstaller>=6.0
          pip install -r requirements.txt

      - name: Install pypore3d from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pypore3d
        continue-on-error: true

      - name: Build CubeLab
        run: pyinstaller --clean --noconfirm cubelab.spec

      - name: Build CubeLab-UserTesting
        run: pyinstaller --clean --noconfirm cubelab-usertesting.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          mkdir installers
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-setup.iss
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true

      - name: Fallback to ZIP
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installers
          Compress-Archive -Path "dist\CubeLab\*" -DestinationPath "installers\CubeLab-Windows.zip"
          Compress-Archive -Path "dist\CubeLab-UserTesting\*" -DestinationPath "installers\CubeLab-UserTesting-Windows.zip"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            installers/*.exe
            installers/*.zip
          retention-days: 30

  # =====================================================
  # RELEASE
  # =====================================================
  release:
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List files
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          generate_release_notes: true