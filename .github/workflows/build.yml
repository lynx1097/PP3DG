name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # CRITICAL: Install EXACT matching PyQt6 versions
      # Using 6.5.x series which is most stable for PyInstaller
      - name: Install PyQt6 (pinned versions)
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.5.2 PyQt6-Qt6==6.5.2 PyQt6-sip==13.5.2 PyQt6-QScintilla==2.14.1

      - name: Install PyInstaller
        run: pip install pyinstaller==6.3.0

      - name: Install other dependencies
        run: |
          pip install pyvista pyvistaqt vtk numpy Pillow
          pip install google-generativeai pydantic python-dotenv psutil
          pip install newrelic-telemetry-sdk

      - name: Install pypore3d from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pypore3d
        continue-on-error: true

      # Verify Qt is working
      - name: Verify PyQt6 installation
        run: |
          python -c "from PyQt6.QtWidgets import QApplication; print('PyQt6.QtWidgets OK')"
          python -c "from PyQt6.QtCore import Qt; print('PyQt6.QtCore OK')"
          python -c "from PyQt6.QtGui import QIcon; print('PyQt6.QtGui OK')"
          python -c "import PyQt6; print(f'PyQt6 path: {PyQt6.__file__}')"

      # Print installed versions for debugging
      - name: Print PyQt6 versions
        run: |
          pip show PyQt6 PyQt6-Qt6 PyQt6-sip | findstr "Name Version"
        shell: cmd

      - name: Build CubeLab
        run: pyinstaller --clean --noconfirm cubelab.spec

      - name: Build CubeLab-UserTesting
        run: pyinstaller --clean --noconfirm cubelab-usertesting.spec

      # Verify build output exists
      - name: Verify build output
        run: |
          if (Test-Path "dist\CubeLab\CubeLab.exe") { Write-Host "CubeLab.exe exists" } else { Write-Error "CubeLab.exe missing!" }
          if (Test-Path "dist\CubeLab-UserTesting\CubeLab-UserTesting.exe") { Write-Host "CubeLab-UserTesting.exe exists" } else { Write-Error "CubeLab-UserTesting.exe missing!" }
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-setup.iss
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true

      # Always create ZIP as backup
      - name: Create ZIP packages
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\CubeLab\*" -DestinationPath "installers\CubeLab-Windows.zip" -Force
          Compress-Archive -Path "dist\CubeLab-UserTesting\*" -DestinationPath "installers\CubeLab-UserTesting-Windows.zip" -Force

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            installers/*.exe
            installers/*.zip
          retention-days: 30

  release:
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          generate_release_notes: true