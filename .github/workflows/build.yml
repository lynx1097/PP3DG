name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Clear pip cache
        run: pip cache purge

      - name: Install dependencies
        run: pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/ 
      - name: Debug Dependencies
        run: |
          pip show PyQt6
          pip show PyQt6-Qt6
          python -c "import sys; print(sys.path)"

      - name: Verify PyQt6
        run: python -c "from PyQt6.QtWidgets import QApplication; from PyQt6.QtCore import QT_VERSION_STR; print('Qt OK:', QT_VERSION_STR)"

      - name: Build CubeLab
        run: pyinstaller --clean --noconfirm cubelab.spec

      - name: Build CubeLab-UserTesting
        run: pyinstaller --clean --noconfirm cubelab-usertesting.spec

      # Verify build output exists
      - name: Verify build output
        run: |
          if (Test-Path "dist\CubeLab\CubeLab.exe") { Write-Host "CubeLab.exe exists" } else { Write-Error "CubeLab.exe missing!" }
          if (Test-Path "dist\CubeLab-UserTesting\CubeLab-UserTesting.exe") { Write-Host "CubeLab-UserTesting.exe exists" } else { Write-Error "CubeLab-UserTesting.exe missing!" }
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-setup.iss
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true

      # Always create ZIP as backup
      - name: Create ZIP packages
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\CubeLab\*" -DestinationPath "installers\CubeLab-Windows.zip" -Force
          Compress-Archive -Path "dist\CubeLab-UserTesting\*" -DestinationPath "installers\CubeLab-UserTesting-Windows.zip" -Force

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            installers/*.exe
            installers/*.zip
          retention-days: 30