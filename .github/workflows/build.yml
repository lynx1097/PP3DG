name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Clear pip cache
        run: pip cache purge

      - name: Install dependencies
        run: pip install -r requirements.txt pypore3d --index-url https://test.pypi.org/simple/
      
      - name: Debug Dependencies
        run: |
          pip show PyQt6
          pip show PyQt6-Qt6
          python -c "import sys; print(sys.path)"

      - name: Verify PyQt6
        run: python -c "from PyQt6.QtWidgets import QApplication; from PyQt6.QtCore import QT_VERSION_STR; print('Qt OK:', QT_VERSION_STR)"

      - name: Build CubeLab
        run: pyinstaller --clean --noconfirm --workpath build/cubelab --distpath dist/CubeLab cubelab.spec

      - name: Build CubeLab-UserTesting
        run: pyinstaller --clean --noconfirm --workpath build/usertesting --distpath dist/CubeLab-UserTesting cubelab-usertesting.spec

      - name: Verify outputs
        shell: pwsh
        run: |
          Test-Path dist/CubeLab/CubeLab.exe
          Test-Path dist/CubeLab-UserTesting/CubeLab-UserTesting.exe
