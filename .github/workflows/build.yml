name: Build & Release Suite (No Storage Usage)

on:
  push:
    #branches: [main]
    tags: ['v*'] # Triggers on tags like v1.0
  #pull_request:
    #branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Required to upload to Releases

env:
  PYTHON_VERSION: '3.11'

jobs:
 
  # ===================================================
  # 3. WINDOWS BUILD & UPLOAD
  # ===================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build Suite
        run: pyinstaller --clean --noconfirm build.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true


      
      # DIRECT UPLOAD: Bypasses Artifact Storage Limit
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: installers/*.exe
          draft: false
          prerelease: true