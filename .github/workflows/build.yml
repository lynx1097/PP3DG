name: Build & Release Suite (No Storage Usage)

on:
  push:
    #branches: [main]
    tags: ['v*'] # Triggers on tags like v1.0
  #pull_request:
    #branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Required to upload to Releases

env:
  PYTHON_VERSION: '3.12.7'

jobs:
 
  # ===================================================
  # 3. WINDOWS BUILD & UPLOAD
  # ===================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'  # Cache pip dependencies
      
      # ========================================
      # OPTIMIZATION 1: Cache PyInstaller build
      # ========================================
      - name: Cache PyInstaller Build
        uses: actions/cache@v4
        with:
          path: |
            build
            __pycache__
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('build.spec', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-
      
      # ========================================
      # OPTIMIZATION 2: Parallel pip install
      # ========================================
      - name: Install Dependencies (Optimized)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-warn-script-location -r requirements.txt pypore3d `
            --index-url https://pypi.org/simple/ `
            --extra-index-url https://test.pypi.org/simple/
        shell: pwsh
      
      # ========================================
      # OPTIMIZATION 3: Use PyInstaller cache
      # ========================================
      - name: Build Suite (with caching)
        run: |
          pyinstaller --clean --noconfirm `
            --log-level WARN `
            --workpath build `
            --distpath dist `
            build.spec
        shell: pwsh
        env:
          PYINSTALLER_COMPILE_BOOTLOADER: 0  # Don't recompile bootloader
      
      - name: Install Inno Setup (Cached)
        run: choco install innosetup -y --no-progress

      - name: Create Windows Installers
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true


      
      # DIRECT UPLOAD: Bypasses Artifact Storage Limit
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: installers/*.exe
          draft: false
          prerelease: true