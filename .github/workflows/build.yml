name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # ✅ Install ONLY PyQt6 (let it control Qt & sip ABI)
      - name: Clear pip cache
        run: pip cache purge

      - name: Install PyQt6
        run: pip install --no-cache-dir PyQt6==6.5.2

      - name: Debug Qt DLL resolution
        run: |
          python -c "import PyQt6.QtCore as c; print(c.__file__)"
          python -c "from PyQt6.QtCore import QLibraryInfo; print(QLibraryInfo.path(QLibraryInfo.LibraryPath.PluginsPath))"


      - name: Verify PyQt6
        run: python -c "import os; os.environ.pop('QT_PLUGIN_PATH', None); os.environ.pop('QT_QPA_PLATFORM_PLUGIN_PATH', None); from PyQt6.QtWidgets import QApplication; from PyQt6.QtCore import QT_VERSION_STR; print('Qt OK:', QT_VERSION_STR)"

      - name: Install visualization deps
        run: pip install pyvista==0.42.3 pyvistaqt==0.11.0 vtk==9.2.6


      - name: Install PyInstaller
        run: pip install pyinstaller==6.3.0

      - name: Install dependencies
        run: |
          pip install numpy Pillow psutil python-dotenv pydantic
          pip install google-generativeai newrelic-telemetry-sdk

      - name: Install pypore3d (optional)
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pypore3d
        continue-on-error: true

     

      # ✅ VC++ runtime for end users
      - name: Install VC Runtime
        run: choco install vcredist140 -y

      # =============================
      # Build CubeLab
      # =============================
      - name: Build CubeLab
        run: |
          pyinstaller --clean --noconfirm --workpath build/cubelab --distpath dist/CubeLab cubelab.spec

      # =============================
      # Build CubeLab UserTesting
      # =============================
      - name: Build CubeLab-UserTesting
        run: |
          pyinstaller --clean --noconfirm --workpath build/usertesting -distpath dist/CubeLab-UserTesting cubelab-usertesting.spec

      - name: Verify outputs
        run: |
          Test-Path dist/CubeLab/CubeLab.exe
          Test-Path dist/CubeLab-UserTesting/CubeLab-UserTesting.exe
        shell: pwsh

      - name: Zip artifacts
        shell: pwsh
        run: |
          Compress-Archive dist/CubeLab/* installers/CubeLab-Windows.zip -Force
          Compress-Archive dist/CubeLab-UserTesting/* installers/CubeLab-UserTesting-Windows.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: installers/*.zip
