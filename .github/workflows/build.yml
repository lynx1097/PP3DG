name: Build Cross-Platform

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===================================================
  # 1. WINDOWS BUILD
  # ===================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pypore3d --index-url https://pypi.org/simple/ --extra-index-url https://test.pypi.org/simple/

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm cubelab-usertesting.spec
          pyinstaller --clean --noconfirm cubelab.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Windows Installers
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\cubelab-usertesting-setup.iss
        continue-on-error: true

      - name: Verify & Zip Windows
        shell: pwsh
        run: |
          if (Test-Path "dist\CubeLab-UserTesting\CubeLab-UserTesting.exe") { Write-Host "Build OK" } else { Write-Error "Build Failed" }
          Compress-Archive -Path "dist\CubeLab-UserTesting\*" -DestinationPath "installers\CubeLab-UserTesting-Windows.zip" -Force

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            installers/*.exe
            installers/*.zip
          retention-days: 10

  # ===================================================
  # 2. MACOS BUILD
  # ===================================================
  build-macos:
    name: Build macOS
    # We use macos-13 (Intel) because macos-latest is Apple Silicon (ARM).
    # Building on Intel allows the app to run on BOTH Intel and Apple Silicon (via Rosetta).
    runs-on: macos-13
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0' # Ensures compatibility back to macOS Monterey
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Tools
        run: brew install create-dmg

      - name: Run Build Script
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: installers/*.dmg
          retention-days: 10

  # ===================================================
  # 3. LINUX BUILD
  # ===================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04 # Newer Ubuntu as requested
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install System Dependencies
        # libfuse2 is NOT included in Ubuntu 22.04+ by default but is required for AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-xinerama0 libxkbcommon-x11-0 libfuse2

      - name: Run Build Script
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1 # Required for appimagetool to run in CI
        run: |
          chmod +x build_linux.sh
          ./build_linux.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: installers/*.AppImage
          retention-days: 10